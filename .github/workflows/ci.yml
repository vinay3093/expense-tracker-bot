# Continuous integration — runs on every push + PR.
#
# Two jobs in parallel:
#
#   * tests — pytest across the supported Python versions.
#   * lint  — ruff (style + isort) + Dockerfile syntax check.
#
# Both must pass before a PR is mergeable.  Status badges in
# README.md surface the result on the GitHub front page.
#
# Free for public repos: GitHub gives unlimited Linux minutes.

name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs on the same branch when a new commit lands.
# Saves CI minutes + makes the status badge reflect the latest commit.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev extras
        # The dev extra pulls in pytest, ruff, telegram, and the
        # Postgres stack (SQLAlchemy + Alembic) — enough to run every
        # test without needing a real Postgres server (we use SQLite
        # in-memory for the nocodb adapter tests).
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,nocodb]"

      - name: Run pytest
        run: pytest -q --maxfail=1

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install "ruff>=0.5"

      - name: ruff check
        run: ruff check src tests

      - name: Dockerfile lint (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          # Don't fail the build on style nits — only real errors.
          failure-threshold: error
