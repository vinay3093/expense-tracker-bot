# Alembic configuration for the Postgres + NocoDB edition.
#
# The DATABASE_URL is picked up from the environment at runtime by
# ``env.py``, so the ``sqlalchemy.url`` line below is intentionally
# left blank.  This means a single .ini file works in dev, CI, and
# prod without secret leakage.
#
# Usage:
#   pip install -e ".[nocodb]"                  # install alembic
#   export DATABASE_URL=postgresql+psycopg://...
#   alembic -c alembic.ini upgrade head         # apply migrations
#   alembic -c alembic.ini history              # show all revisions
#   alembic -c alembic.ini current              # show current revision
#
# For first-time bootstrap you can also run:
#   expense --init-postgres
# which calls Base.metadata.create_all() directly — fine for a
# personal install, but switch to alembic for any subsequent change.

[alembic]
script_location = src/expense_tracker/ledger/nocodb/migrations
prepend_sys_path = .
# Use os.pathsep when splitting prepend_sys_path / version_locations
# (silences a Alembic 1.18+ deprecation warning).
path_separator = os
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
