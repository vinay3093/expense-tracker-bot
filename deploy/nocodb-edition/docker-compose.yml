# Postgres + NocoDB stack for the chat-driven expense tracker.
#
# Two services:
#
# * postgres  – the master ledger, mounted on a named volume so
#               your data survives `docker compose down`.
# * nocodb    – the spreadsheet-style UI, talking to Postgres via
#               the internal Docker network.  Browse to
#               http://<host>:8080 to use it.
#
# Designed for a free-tier VM (1-2 GB RAM, 1 vCPU): no replicas,
# no swapping the data into named volumes, sane resource limits.
#
# Usage (on the VM, after running setup.sh):
#
#   cd ~/expense-tracker-bot
#   sudo docker compose -f deploy/nocodb-edition/docker-compose.yml up -d
#   sudo docker compose -f deploy/nocodb-edition/docker-compose.yml ps
#
# Then point your bot at the same Postgres by setting in .env:
#
#   STORAGE_BACKEND=nocodb
#   DATABASE_URL=postgresql+psycopg://expense:CHANGEME@localhost:5432/expense
#
# (NocoDB and the bot share the same `transactions` table.)
#
# All secrets here come from environment variables to keep them out
# of git.  The setup.sh script generates an .env-deploy file that
# `docker compose --env-file` reads — never commit that file.

name: expense-tracker

services:
  postgres:
    image: postgres:16-alpine
    container_name: expense-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-expense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-expense}
      # Trust local connections from the docker network only.
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    ports:
      # Expose to localhost only so the bot (running on the VM
      # outside docker) can reach it.  Do NOT expose to 0.0.0.0.
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-expense} -d ${POSTGRES_DB:-expense}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  nocodb:
    image: nocodb/nocodb:latest
    container_name: expense-nocodb
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # NocoDB stores its own metadata in the same Postgres
      # instance (in a separate database, "nocodb_meta"), keeping
      # the deploy single-process.
      NC_DB: "pg://postgres:5432?u=${POSTGRES_USER:-expense}&p=${POSTGRES_PASSWORD}&d=nocodb_meta"
      # JWT secret for NocoDB's own auth.  Generated by setup.sh.
      NC_AUTH_JWT_SECRET: ${NC_AUTH_JWT_SECRET:?NC_AUTH_JWT_SECRET must be set}
      # Disable telemetry — your spreadsheet, your business.
      NC_DISABLE_TELE: "true"
      NC_PUBLIC_URL: ${NC_PUBLIC_URL:-http://localhost:8080}
    ports:
      # Bind to 0.0.0.0 so you can reach the UI from your laptop.
      # Run NocoDB behind Caddy / Nginx for HTTPS in production.
      - "8080:8080"
    volumes:
      - nocodb_data:/usr/app/data/
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  postgres_data:
    name: expense_postgres_data
  nocodb_data:
    name: expense_nocodb_data
