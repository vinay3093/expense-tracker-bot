# Canonical category taxonomy for the expense tracker.
#
# This list is the *contract* between three layers:
#
#   1. The LLM extractor — the canonical names below are what stage-2
#      prompts list as the allowed values, and what the model is asked
#      to emit.
#   2. The category-registry alias map — the LLM (or a human typing
#      synonyms) can say "starbucks" and we collapse it to "Food".
#   3. The Sheets builder — every monthly tab gets one column per
#      canonical name, in the order they appear here.
#
# So: add a category by adding an entry with at least `name`. Add an
# alias by adding to that category's `aliases` list. Reorder by moving
# the entries around. The bot picks up changes on next process start.
#
# `fallback_category` is the catch-all bucket used when:
#   - The LLM emits a category we can't resolve via aliases.
#   - The user logs something that doesn't match any vocabulary.
# It MUST match one of the canonical `name` values below.

schema_version: 2
fallback_category: Miscellaneous

categories:
  - name: Groceries
    hint: supermarket food shopping (NOT eating out)
    aliases:
      [groceries, grocery, groc, supermarket, fruits, fruit, vegetables, veg,
       trader joes, traderjoes, walmart, costco, kroger, hmart, indian store,
       kirana, milk, eggs, bread, produce, whole foods, sprouts, aldi, target food]

  - name: House
    hint: rent, electricity, water, wifi, apartment maintenance / fees
    aliases:
      [house, rent, mortgage, electricity, electric, electric bill, power,
       power bill, water, water bill, wifi, internet, broadband, comcast,
       xfinity, att internet, apartment, apartment charge, apartment fee,
       digital apartment charge, trash, trash bill, maintenance, hoa,
       gas bill, utility, utilities]

  - name: Food
    hint: dining out, restaurants, takeout, coffee, juice, ice cream, snacks
    aliases:
      [food, restaurant, restaurants, dining, dining out, eat out, eatout,
       eating out, lunch, dinner, breakfast, brunch, takeout, takeaway,
       doordash, ubereats, uber eats, grubhub, swiggy, zomato, coffee,
       cafe, starbucks, latte, cappuccino, espresso, tea, chai, juice,
       smoothie, ice cream, icecream, dessert, snack, snacks, pizza,
       burger, biryani, pho, sushi, ramen, indian restaurant, chipotle]

  - name: Party
    hint: alcohol, drinks, bar, beer, wine, liquor
